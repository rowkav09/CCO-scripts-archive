name: Sync Vote Counts

on:
  push:
    paths:
      - 'sync-votes.cjs'
      - '.github/workflows/sync-votes.yml'
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  sync-votes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-save

      - name: Sync vote counts
        run: node sync-votes.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync vote counts'
          file_pattern: wiki/*.md