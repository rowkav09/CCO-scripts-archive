name: Publish wiki

permissions:
  contents: write

on:
  push:
    branches: [main]

concurrency:
  group: wiki
  cancel-in-progress: true

jobs:
  wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd scripts
          npm install --no-save
      - name: Generate Wiki Pages
        run: |
          node scripts/generate-wiki.cjs
      - name: Show wiki directory contents
        run: |
          ls -l wiki
      - name: Publish to GitHub Wiki
        uses: swift-docs/wiki@v1
        with:
          path: wiki
          commit_message: "Automated wiki update"
