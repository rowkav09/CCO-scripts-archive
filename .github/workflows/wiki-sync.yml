name: Sync Wiki with Scripts

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'wiki/**'

jobs:
  generate-and-sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts
          npm install --no-save

      - name: Generate Wiki Pages
        run: |
          node scripts/generate-wiki.js

      - name: Sync Wiki to GitHub Wiki
        uses: spenserblack/actions-wiki@v1
        with:
          path: wiki
