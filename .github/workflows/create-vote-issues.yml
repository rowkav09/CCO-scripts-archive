name: Create Vote Issues for Scripts

on:
  push:
    paths:
      - 'scripts/**/*.js'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-vote-issues:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Vote Issues for All Scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Scanning for .js scripts..."

          mapfile -t script_files < <(find scripts -type f -name "*.js" | sort)

          echo "Found ${#script_files[@]} script files"

          for file in "${script_files[@]}"; do
            script_name=$(basename "$file")
            
            echo "Checking: $script_name"

            issue_exists=$(gh issue list --state open --limit 1000 --json title --jq "map(select(.title == \"[Vote] ${script_name}\")) | length" || echo "0")

            if [ "$issue_exists" = "0" ]; then
              echo "✅ Creating vote issue for: $script_name"
              
              gh issue create \
                --title "[Vote] $script_name" \
                --body "Please comment a numeric rating 0-10 for this script. Only your latest numeric comment will be counted.\n\n**Script Path:** \`$file\`\n\n**How to vote:**\n- Comment a single number between 0 and 10 (e.g. \`8\` or \`10\`)\n- To change your rating, post another numeric comment; only your latest numeric vote counts\n\nA leaderboard and per-category ratings will be generated automatically in the Wiki." \
                --label "vote" \
                --repo rowkav09/CCO-scripts-archive
            else
              echo "⏭️  Vote issue already exists for $script_name"
            fi
          done

          echo "✅ Vote issue creation process completed."