name: Create Vote Issues for Scripts

on:
  push:
    paths:
      - 'scripts/**/*.js'
  workflow_dispatch:     # Manual trigger recommended

permissions:
  issues: write
  contents: read

jobs:
  create-vote-issues:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Vote Issues for All Scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Scanning for .js scripts..."

          # Find ALL .js files in scripts folder
          mapfile -t script_files < <(find scripts -type f -name "*.js" | sort)

          echo "Found ${#script_files[@]} script files"

          for file in "${script_files[@]}"; do
            script_name=$(basename "$file")
            
            echo "Checking: $script_name"

            # Check if vote issue already exists
            issue_exists=$(gh issue list \
              --search "\"[Vote] $script_name\"" \
              --state open \
              --json number \
              -q 'length([])' || echo "0")

            if [ "$issue_exists" = "0" ]; then
              echo "✅ Creating vote issue for: $script_name"
              
              gh issue create \
                --title "[Vote] $script_name" \
                --body "React with 👍 to upvote this script.

**Script Path:** \`$file\`

**How to vote:**
- 👍 = Upvote / Recommend this script
- 👎 = Downvote

Vote counts will be shown automatically in the Wiki." \
                --label "vote" \
                --repo rowkav09/CCO-scripts-archive
            else
              echo "⏭️  Vote issue already exists for $script_name"
            fi
          done

          echo "✅ Vote issue creation process completed."