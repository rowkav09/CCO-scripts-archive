name: Generate Wiki Pages

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/wiki-generate.yml'
      - 'generate-wiki.cjs'

  workflow_dispatch:

jobs:
  generate-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Wiki Pages
        run: node generate-wiki.cjs

      - name: Commit and Push Wiki Changes (Safe Method)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add wiki/*.md
          
          if git diff --staged --quiet; then
            echo "No changes to wiki files."
          else
            git commit -m "chore: update generated wiki files"
            git push
            echo "Wiki files successfully updated and pushed."
          fi