name: Generate & Sync Wiki

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/wiki-generate.yml'
      - 'generate-wiki.cjs'

  workflow_dispatch:

jobs:
  generate-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: pull latest changes
        run: git pull

      - name: Generate Wiki Pages
        run: node generate-wiki.cjs

      - name: Commit Wiki Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add -A wiki
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update generated wiki files"
            git push
            echo "Wiki files committed and pushed"
          fi

      - name: Sync to GitHub Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}