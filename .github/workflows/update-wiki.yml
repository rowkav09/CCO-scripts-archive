name: Update Wiki


on:
  push:
    paths:
      - 'scripts/**'
      - 'update-categories.js'
      - '.github/workflows/update-wiki.yml'
  workflow_dispatch:


permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run update-categories.js
        run: |
          set -e
          node update-categories.js

      - name: Checkout Wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki

      - name: Copy Home.md to Wiki
        run: |
          cp Home.md wiki/Home.md

      - name: Commit & Push to Wiki
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Home.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update wiki pages"
          git push

