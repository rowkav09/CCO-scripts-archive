name: Repository Maintenance

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'README.md'
      - '*.cjs'
      - '.github/workflows/maintenance.yml'
  workflow_dispatch:

concurrency:
  group: repo-write
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rename .js scripts to .user.js
        run: |
          find scripts -type f -name "*.js" ! -name "*.user.js" | while read -r f; do
            newf="${f%.js}.user.js"
            git mv "$f" "$newf"
            echo "Renamed: $f → $newf"
          done

      - name: Migrate Vote Issue Titles (.js → .user.js)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking for vote issues with old .js titles..."

          old_issues=$(gh issue list --state open --label vote --limit 1000 \
            --json number,title \
            --jq '.[] | select(.title | test("\\[Vote\\] [^\\n]+\\.js$") and (test("\\[Vote\\] [^\\n]+\\.user\\.js$") | not)) | "\(.number)|\(.title)"' \
            || echo "")

          if [ -z "$old_issues" ]; then
            echo "No vote issue titles need migrating"
          else
            while IFS='|' read -r number title; do
              new_title="${title%.js}.user.js"
              echo "Migrating issue #$number: '$title' → '$new_title'"
              gh issue edit "$number" --title "$new_title" --repo "${{ github.repository }}"
            done <<< "$old_issues"
          fi

      - name: Generate Wiki Pages
        run: node generate-wiki.cjs

      - name: Create Vote Issues for All Scripts
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Scanning for .user.js scripts..."

          mapfile -t script_files < <(find scripts -type f -name "*.user.js" | sort)

          echo "Found ${#script_files[@]} script files"

          echo "Fetching existing vote issues..."
          existing_titles=$(gh issue list --state open --label vote --limit 1000 --json title --jq '.[].title' || echo "")

          for file in "${script_files[@]}"; do
            script_name=$(basename "$file")

            echo "Checking: $script_name"

            if echo "$existing_titles" | grep -qxF "[Vote] ${script_name}"; then
              echo "Vote issue already exists for $script_name"
            else
              echo "Creating vote issue for: $script_name"

              gh issue create \
                --title "[Vote] $script_name" \
                --body "Please comment a numeric rating 0-10 for this script. Only your latest numeric comment will be counted.\n\n**Script:** [\`$file\`](${{ github.server_url }}/${{ github.repository }}/blob/main/$file)\n\n**How to vote:**\n- Comment a single number between 0 and 10 (e.g. \`8\` or \`10\`)\n- To change your rating, post another numeric comment; only your latest numeric vote counts\n\nA leaderboard and per-category ratings will be generated automatically in the Wiki." \
                --label "vote" \
                --repo "${{ github.repository }}"
            fi
          done

          echo "Vote issue creation process completed."

      - name: Sync Vote Counts
        run: node sync-votes.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Leaderboard
        run: node leaderboard-update.cjs

      - name: Sync Author Folders
        run: node sync-author-folders.cjs

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          git add -A README.md wiki .github/ISSUE_TEMPLATE authors/ scripts/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update generated files"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
            echo "Repository files committed and pushed"
          fi

      - name: Sync to GitHub Wiki
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${WIKI_TOKEN}" ]; then
            echo "Missing WIKI_TOKEN secret"
            exit 1
          fi

          wiki_sync_dir="$(mktemp -d)"
          git clone --depth 1 --branch master "https://x-access-token:${WIKI_TOKEN}@github.com/${{ github.repository }}.wiki.git" "$wiki_sync_dir"
          rsync -a --delete --exclude='.git' wiki/ "$wiki_sync_dir"/

          git -C "$wiki_sync_dir" config user.name "github-actions[bot]"
          git -C "$wiki_sync_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git -C "$wiki_sync_dir" add -A

          if git -C "$wiki_sync_dir" diff --staged --quiet; then
            echo "No wiki changes to commit"
          else
            git -C "$wiki_sync_dir" commit -m "chore: sync generated wiki pages"
            git -C "$wiki_sync_dir" push --force-with-lease origin HEAD:master
            echo "GitHub Wiki updated"
          fi
