name: Update Leaderboard


on:
  push:
    paths:
      - 'scripts/**'
      - 'leaderboard-update.js'
      - '.github/workflows/update-leaderboard.yml'
      - 'README.md'
      - '*.cjs'
  workflow_dispatch:

permissions:
  contents: write


jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Update Script Categories in Home.md
        run: |
          set -e
          node update-categories.cjs
      - name: Run leaderboard update script
        run: |
          set -e
          node leaderboard-update.js
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update leaderboard and Script Categories'
          file_pattern: |
            README.md
            Home.md
