name: Script Vote
description: Vote on a script by commenting a numeric rating (0-10)
title: "[Vote] "
labels: ["vote"]
body:
  - type: markdown
    attributes:
      value: |
        ## Vote for this script
        Please comment a single number between 0 and 10 (e.g. `8` or `10`). Only your latest numeric comment will be counted.
        The leaderboard updates automatically.